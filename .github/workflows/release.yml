name: Release

on:
  repository_dispatch:
    types: [release]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or branch) in the private source repo"
        required: true
      head_sha:
        description: "Optional exact source commit SHA or prefix; leave empty to resolve from ref automatically"
        required: false
      version:
        description: "Version without leading v (for example 0.1.0 or 0.1.0-beta.1)"
        required: true
      source_repository:
        description: "Private OpenCoWork source repository"
        required: false
        default: "daymade/opencowork"
      release_entrypoint:
        description: "Assembly script path inside the private source repository"
        required: false
        default: "scripts/release/assemble-public-release.sh"
      runtime_fallback_build:
        description: "Emergency mode: build runtime bundles in public release jobs instead of requiring prepublished source runtime assets"
        required: false
        type: boolean
        default: true

concurrency:
  group: release-${{ github.event.client_payload.version || inputs.version }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.params.outputs.ref }}
      head_sha: ${{ steps.params.outputs.head_sha }}
      version: ${{ steps.params.outputs.version }}
      source_repository: ${{ steps.params.outputs.source_repository }}
      release_entrypoint: ${{ steps.params.outputs.release_entrypoint }}
      runtime_fallback_build: ${{ steps.params.outputs.runtime_fallback_build }}
    steps:
      - name: Resolve release parameters
        id: params
        env:
          DEFAULT_SOURCE_REPOSITORY: daymade/opencowork
          DEFAULT_RELEASE_ENTRYPOINT: scripts/release/assemble-public-release.sh
          SOURCE_REPO_TOKEN: ${{ secrets.OPENCOWORK_SOURCE_REPO_TOKEN }}
          PAYLOAD_HEAD_SHA_SNAKE: ${{ github.event.client_payload.head_sha }}
          PAYLOAD_HEAD_SHA_CAMEL: ${{ github.event.client_payload.headSha }}
          PAYLOAD_SOURCE_REPOSITORY_SNAKE: ${{ github.event.client_payload.source_repository }}
          PAYLOAD_SOURCE_REPOSITORY_CAMEL: ${{ github.event.client_payload.sourceRepository }}
          PAYLOAD_SOURCE_REPOSITORY_SHORT: ${{ github.event.client_payload.sourceRepo }}
          PAYLOAD_RELEASE_ENTRYPOINT_SNAKE: ${{ github.event.client_payload.release_entrypoint }}
          PAYLOAD_RELEASE_ENTRYPOINT_CAMEL: ${{ github.event.client_payload.releaseEntrypoint }}
          PAYLOAD_RUNTIME_FALLBACK_BUILD: ${{ github.event.client_payload.runtime_fallback_build }}
          PAYLOAD_RUNTIME_FALLBACK_BUILD_CAMEL: ${{ github.event.client_payload.runtimeFallbackBuild }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.ref }}"
            HEAD_SHA="${PAYLOAD_HEAD_SHA_SNAKE:-$PAYLOAD_HEAD_SHA_CAMEL}"
            VERSION="${{ github.event.client_payload.version }}"
            SOURCE_REPOSITORY="${PAYLOAD_SOURCE_REPOSITORY_SNAKE:-$PAYLOAD_SOURCE_REPOSITORY_CAMEL}"
            SOURCE_REPOSITORY="${SOURCE_REPOSITORY:-$PAYLOAD_SOURCE_REPOSITORY_SHORT}"
            RELEASE_ENTRYPOINT="${PAYLOAD_RELEASE_ENTRYPOINT_SNAKE:-$PAYLOAD_RELEASE_ENTRYPOINT_CAMEL}"
            RUNTIME_FALLBACK_BUILD="${PAYLOAD_RUNTIME_FALLBACK_BUILD:-${PAYLOAD_RUNTIME_FALLBACK_BUILD_CAMEL:-true}}"
          else
            REF="${{ inputs.ref }}"
            HEAD_SHA="${{ inputs.head_sha }}"
            VERSION="${{ inputs.version }}"
            SOURCE_REPOSITORY="${{ inputs.source_repository }}"
            RELEASE_ENTRYPOINT="${{ inputs.release_entrypoint }}"
            RUNTIME_FALLBACK_BUILD="${{ inputs.runtime_fallback_build }}"
          fi

          SOURCE_REPOSITORY="${SOURCE_REPOSITORY:-$DEFAULT_SOURCE_REPOSITORY}"
          RELEASE_ENTRYPOINT="${RELEASE_ENTRYPOINT:-$DEFAULT_RELEASE_ENTRYPOINT}"
          RUNTIME_FALLBACK_BUILD="$(printf '%s' "$RUNTIME_FALLBACK_BUILD" | tr '[:upper:]' '[:lower:]')"
          if [[ "$RUNTIME_FALLBACK_BUILD" != "true" && "$RUNTIME_FALLBACK_BUILD" != "false" ]]; then
            echo "::error::Invalid runtime_fallback_build value: $RUNTIME_FALLBACK_BUILD"
            echo "::error::Expected true or false."
            exit 1
          fi

          if [ -z "$REF" ] || [ -z "$VERSION" ]; then
            echo "::error::ref and version are required."
            exit 1
          fi

          if [ -z "${SOURCE_REPO_TOKEN:-}" ]; then
            echo "::error::OPENCOWORK_SOURCE_REPO_TOKEN is required to resolve the source ref."
            exit 1
          fi

          CANONICAL_HEAD_SHA="$(git ls-remote "https://x-access-token:${SOURCE_REPO_TOKEN}@github.com/${SOURCE_REPOSITORY}.git" "$REF" | awk 'NR==1 {print $1}')"
          if [ -z "$CANONICAL_HEAD_SHA" ]; then
            echo "::error::Unable to resolve source ref $REF in $SOURCE_REPOSITORY"
            echo "::error::Use a branch or tag ref that exists in the private source repository."
            exit 1
          fi

          HEAD_SHA="$(bash scripts/normalize-source-head-sha.sh \
            --resolved-sha "$CANONICAL_HEAD_SHA" \
            --requested-sha "${HEAD_SHA:-}")"

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_repository=$SOURCE_REPOSITORY" >> "$GITHUB_OUTPUT"
          echo "release_entrypoint=$RELEASE_ENTRYPOINT" >> "$GITHUB_OUTPUT"
          echo "runtime_fallback_build=${RUNTIME_FALLBACK_BUILD:-false}" >> "$GITHUB_OUTPUT"

      - name: Log resolved release parameters
        run: |
          echo "resolved public release parameters:"
          echo "  ref=${{ steps.params.outputs.ref }}"
          echo "  head_sha=${{ steps.params.outputs.head_sha }}"
          echo "  version=${{ steps.params.outputs.version }}"
          echo "  source_repository=${{ steps.params.outputs.source_repository }}"
          echo "  release_entrypoint=${{ steps.params.outputs.release_entrypoint }}"
          echo "  runtime_fallback_build=${{ steps.params.outputs.runtime_fallback_build }}"

  submit-notarization-stage:
    needs: prepare
    runs-on: macos-14
    timeout-minutes: 240
    env:
      RELEASE_DIST: /tmp/opencowork-release-dist
      RUNTIME_BUNDLE_DIST: /tmp/opencowork-runtime-dist
    steps:
      - name: Checkout private source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.prepare.outputs.source_repository }}
          token: ${{ secrets.OPENCOWORK_SOURCE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup uv
        if: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Setup Python
        if: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' }}
        run: uv python install 3.12

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Verify checked out commit
        run: |
          ACTUAL_SHA="$(git rev-parse HEAD)"
          EXPECTED_SHA="${{ needs.prepare.outputs.head_sha }}"
          if [[ "$ACTUAL_SHA" != "$EXPECTED_SHA" && "$ACTUAL_SHA" != "${EXPECTED_SHA}"* ]]; then
            echo "::error::Checked out commit $ACTUAL_SHA does not match requested head_sha $EXPECTED_SHA"
            exit 1
          fi

      - name: Restore Electron downloads cache
        id: electron-cache-restore
        continue-on-error: true
        uses: actions/cache/restore@v5
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ needs.prepare.outputs.version }}-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Prepare artifact directory
        run: mkdir -p "$RELEASE_DIST" "$RUNTIME_BUNDLE_DIST"

      - name: Install Python dependencies for runtime fallback
        if: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' }}
        run: uv sync --all-extras

      - name: Build runtime bundle in public macOS job
        if: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' }}
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          OPENCOWORK_RELEASE_PLATFORM: darwin
          OPENCOWORK_RELEASE_ARCH: arm64
        run: |
          bash scripts/release/build-runtime-bundle.sh \
            --version "$RELEASE_VERSION" \
            --head-sha "$RELEASE_HEAD_SHA" \
            --output-dir "$RUNTIME_BUNDLE_DIST"

      - name: Run private release assembly contract (submit notarization stage)
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_REF: ${{ needs.prepare.outputs.ref }}
          RELEASE_HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          RELEASE_ENTRYPOINT: ${{ needs.prepare.outputs.release_entrypoint }}
          GH_TOKEN: ${{ secrets.OPENCOWORK_SOURCE_REPO_TOKEN }}
          OPENCOWORK_SOURCE_REPO: ${{ needs.prepare.outputs.source_repository }}
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          OPENCOWORK_RUNTIME_BUNDLE_LOCAL_FILE: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' && format('{0}/opencowork-runtime-{1}-darwin-arm64.tar.gz', env.RUNTIME_BUNDLE_DIST, needs.prepare.outputs.version) || '' }}
          OPENCOWORK_RUNTIME_BUNDLE_LOCAL_SHA_FILE: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' && format('{0}/opencowork-runtime-{1}-darwin-arm64.tar.gz.sha256', env.RUNTIME_BUNDLE_DIST, needs.prepare.outputs.version) || '' }}
          ELECTRON_CACHE: ${{ vars.ELECTRON_CACHE }}
          ELECTRON_DOWNLOAD_URL: ${{ vars.ELECTRON_DOWNLOAD_URL }}
          ELECTRON_MIRROR: ${{ vars.ELECTRON_MIRROR }}
          ELECTRON_CUSTOM_DIR: ${{ vars.ELECTRON_CUSTOM_DIR }}
          ELECTRON_CUSTOM_FILENAME: ${{ vars.ELECTRON_CUSTOM_FILENAME }}
          OPENCOWORK_RELEASE_MODE: submit
        run: |
          ENTRYPOINT="$GITHUB_WORKSPACE/$RELEASE_ENTRYPOINT"
          if [ ! -f "$ENTRYPOINT" ]; then
            echo "::error::Private release entrypoint not found: $RELEASE_ENTRYPOINT"
            echo "::error::Implement the contract in the private source repository before using this public release workflow."
            exit 1
          fi

          chmod +x "$ENTRYPOINT"
          ENTRYPOINT_ARGS=(
            --version "$RELEASE_VERSION"
            --ref "$RELEASE_REF"
            --head-sha "$RELEASE_HEAD_SHA"
            --output-dir "$RELEASE_DIST"
          )
          if bash "$ENTRYPOINT" --help >/tmp/release-entrypoint-help.txt 2>&1; then
            if grep -q -- "--mode" /tmp/release-entrypoint-help.txt; then
              ENTRYPOINT_ARGS+=(--mode submit)
            fi
          fi
          bash "$ENTRYPOINT" "${ENTRYPOINT_ARGS[@]}"

      - name: Upload notarization stage artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-notarize-stage
          retention-days: 7
          path: |
            ${{ env.RELEASE_DIST }}/_internal/OpenCoWork.app.zip
            ${{ env.RELEASE_DIST }}/_internal/notarization-state.json
            ${{ env.RELEASE_DIST }}/_internal/release-contract.json

      - name: Save Electron downloads cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ needs.prepare.outputs.version }}-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}

  release:
    needs: [prepare, resume-release-assets, build-windows-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_DIR: ${{ github.workspace }}/.gha-release
      INTERNAL_DIR: ${{ github.workspace }}/.gha-release/_internal
    steps:
      - name: Checkout public release repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Aggregate release payload
        run: |
          bash scripts/aggregate-release.sh \
            --artifacts-dir "$GITHUB_WORKSPACE/artifacts" \
            --release-dir "$RELEASE_DIR" \
            --internal-dir "$INTERNAL_DIR" \
            --version "${{ needs.prepare.outputs.version }}" \
            --source-repository "${{ needs.prepare.outputs.source_repository }}" \
            --source-ref "${{ needs.prepare.outputs.ref }}" \
            --source-head-sha "${{ needs.prepare.outputs.head_sha }}"
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_REF: ${{ needs.prepare.outputs.ref }}
          RELEASE_HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          SOURCE_REPOSITORY: ${{ needs.prepare.outputs.source_repository }}

      - name: Verify aggregated release assets
        run: |
          bash scripts/verify-release-assets.sh \
            --release-dir "$RELEASE_DIR" \
            --metadata "$RELEASE_DIR/release-metadata.json"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: false
          draft: true
          prerelease: ${{ contains(needs.prepare.outputs.version, '-') }}
          body_path: ${{ env.INTERNAL_DIR }}/release-notes.md
          files: |
            ${{ env.RELEASE_DIR }}/OpenCoWork-*.dmg
            ${{ env.RELEASE_DIR }}/OpenCoWork-*.zip
            ${{ env.RELEASE_DIR }}/OpenCoWork-*.blockmap
            ${{ env.RELEASE_DIR }}/OpenCoWork-*.exe
            ${{ env.RELEASE_DIR }}/latest.yml
            ${{ env.RELEASE_DIR }}/latest-mac.yml
            ${{ env.RELEASE_DIR }}/SHA256SUMS.txt
            ${{ env.RELEASE_DIR }}/release-metadata.json

  verify-published-macos:
    needs: [prepare, release]
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - name: Verify published DMG from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          VERIFY_DIR="$(mktemp -d /tmp/opencowork-published-verify.XXXXXX)"
          MOUNT_DIR="$(mktemp -d /tmp/opencowork-published-dmg.XXXXXX)"

          cleanup() {
            hdiutil detach "$MOUNT_DIR" -force >/dev/null 2>&1 || true
            rm -rf "$VERIFY_DIR"
            rmdir "$MOUNT_DIR" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          gh release download "v$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "OpenCoWork-*.dmg" \
            --dir "$VERIFY_DIR" \
            --clobber

          DMG_FILE="$(find "$VERIFY_DIR" -name 'OpenCoWork-*.dmg' | head -1)"
          if [ -z "$DMG_FILE" ]; then
            echo "::error::Published DMG not found after release download"
            exit 1
          fi

          xcrun stapler validate "$DMG_FILE"
          hdiutil attach "$DMG_FILE" -mountpoint "$MOUNT_DIR" -nobrowse -readonly >/dev/null

          APP_PATH="$MOUNT_DIR/OpenCoWork.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::OpenCoWork.app not found inside published DMG"
            exit 1
          fi

          codesign --verify --deep --strict "$APP_PATH"
          CODESIGN_INFO="$(codesign -dvv "$APP_PATH" 2>&1 || true)"
          printf '%s\n' "$CODESIGN_INFO" | grep -q "Developer ID Application"
          printf '%s\n' "$CODESIGN_INFO" | grep -q "runtime"
          spctl --assess --type execute --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"

  verify-published-windows:
    needs: [prepare, release]
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout private source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.prepare.outputs.source_repository }}
          token: ${{ secrets.OPENCOWORK_SOURCE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Verify checked out commit
        shell: bash
        run: |
          ACTUAL_SHA="$(git rev-parse HEAD)"
          EXPECTED_SHA="${{ needs.prepare.outputs.head_sha }}"
          if [[ "$ACTUAL_SHA" != "$EXPECTED_SHA" && "$ACTUAL_SHA" != "${EXPECTED_SHA}"* ]]; then
            echo "::error::Checked out commit $ACTUAL_SHA does not match requested head_sha $EXPECTED_SHA"
            exit 1
          fi

      - name: Download published Windows assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          VERIFY_DIR="${RUNNER_TEMP}/opencowork-published-windows"
          mkdir -p "$VERIFY_DIR"
          gh release download "v$RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "OpenCoWork-*.exe" \
            --pattern "OpenCoWork-*.zip" \
            --pattern "OpenCoWork-*.blockmap" \
            --pattern "latest.yml" \
            --dir "$VERIFY_DIR" \
            --clobber
          echo "VERIFY_DIR=$VERIFY_DIR" >> "$GITHUB_ENV"

      - name: Run published Windows installer smoke
        shell: bash
        run: |
          node scripts/run-packaged-installer-smoke-windows.cjs --release-dir "$VERIFY_DIR"

  publish-release:
    needs: [prepare, release, verify-published-macos, verify-published-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish verified draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          RELEASE_ID="$(gh release view "v$RELEASE_VERSION" --repo "$GITHUB_REPOSITORY" --json databaseId --jq '.databaseId')"
          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Unable to resolve draft release id for v$RELEASE_VERSION"
            exit 1
          fi
          gh api \
            --method PATCH \
            "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
            -F draft=false >/dev/null

  build-windows-release:
    needs: prepare
    runs-on: windows-latest
    timeout-minutes: 240
    env:
      RELEASE_DIST: ${{ github.workspace }}/.gha-release-dist
      RUNTIME_BUNDLE_DIST: ${{ github.workspace }}/.gha-runtime-dist
      OPENCOWORK_RELEASE_PLATFORM: win32
      OPENCOWORK_RELEASE_ARCH: x64
    steps:
      - name: Checkout private source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.prepare.outputs.source_repository }}
          token: ${{ secrets.OPENCOWORK_SOURCE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup uv
        if: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' }}
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Setup Python
        if: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' }}
        run: uv python install 3.12

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Restore Electron downloads cache
        id: electron-cache-restore
        continue-on-error: true
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ needs.prepare.outputs.version }}-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Verify checked out commit
        shell: bash
        run: |
          ACTUAL_SHA="$(git rev-parse HEAD)"
          EXPECTED_SHA="${{ needs.prepare.outputs.head_sha }}"
          if [[ "$ACTUAL_SHA" != "$EXPECTED_SHA" && "$ACTUAL_SHA" != "${EXPECTED_SHA}"* ]]; then
            echo "::error::Checked out commit $ACTUAL_SHA does not match requested head_sha $EXPECTED_SHA"
            exit 1
          fi

      - name: Log Windows build context
        shell: bash
        env:
          LOCAL_RUNTIME_BUNDLE_FILE: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' && format('{0}/opencowork-runtime-{1}-win32-x64.tar.gz', env.RUNTIME_BUNDLE_DIST, needs.prepare.outputs.version) || '' }}
          LOCAL_RUNTIME_BUNDLE_SHA_FILE: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' && format('{0}/opencowork-runtime-{1}-win32-x64.tar.gz.sha256', env.RUNTIME_BUNDLE_DIST, needs.prepare.outputs.version) || '' }}
        run: |
          echo "Windows build context:"
          echo "  version=${{ needs.prepare.outputs.version }}"
          echo "  head_sha=${{ needs.prepare.outputs.head_sha }}"
          echo "  source_repository=${{ needs.prepare.outputs.source_repository }}"
          echo "  release_entrypoint=${{ needs.prepare.outputs.release_entrypoint }}"
          echo "  runtime_fallback_build=${{ needs.prepare.outputs.runtime_fallback_build }}"
          echo "  release_platform=${OPENCOWORK_RELEASE_PLATFORM}"
          echo "  release_arch=${OPENCOWORK_RELEASE_ARCH}"
          echo "  runtime_bundle_dist=${RUNTIME_BUNDLE_DIST}"
          echo "  release_dist=${RELEASE_DIST}"
          echo "  local runtime bundle file: ${LOCAL_RUNTIME_BUNDLE_FILE:-<not set>}"
          echo "  local runtime sha file: ${LOCAL_RUNTIME_BUNDLE_SHA_FILE:-<not set>}"
          if [[ -n "${LOCAL_RUNTIME_BUNDLE_FILE}" ]]; then
            if [[ -f "${LOCAL_RUNTIME_BUNDLE_FILE}" ]]; then
              echo "  local runtime bundle exists: yes"
              ls -l "${LOCAL_RUNTIME_BUNDLE_FILE}"
              if [[ -n "${LOCAL_RUNTIME_BUNDLE_SHA_FILE}" && -f "${LOCAL_RUNTIME_BUNDLE_SHA_FILE}" ]]; then
                echo "  local runtime bundle sha exists: yes"
                ls -l "${LOCAL_RUNTIME_BUNDLE_SHA_FILE}"
              elif [[ -n "${LOCAL_RUNTIME_BUNDLE_SHA_FILE}" ]]; then
                echo "  local runtime bundle sha missing: ${LOCAL_RUNTIME_BUNDLE_SHA_FILE}"
              fi
            else
              echo "  local runtime bundle exists: no"
              echo "  ⚠️  runtime bundle fallback path is set but artifact is absent; assembly will fail unless private asset download is used."
            fi
          fi

      - name: Prepare artifact directories
        shell: bash
        run: |
          mkdir -p "$RELEASE_DIST" "$RUNTIME_BUNDLE_DIST"

      - name: Install Python dependencies for runtime fallback
        if: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' }}
        run: uv sync --all-extras

      - name: Build runtime bundle in public Windows job
        if: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' }}
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          OPENCOWORK_RELEASE_PLATFORM: win32
          OPENCOWORK_RELEASE_ARCH: x64
        run: |
          bash scripts/release/build-runtime-bundle.sh \
            --version "$RELEASE_VERSION" \
            --head-sha "$RELEASE_HEAD_SHA" \
            --output-dir "$RUNTIME_BUNDLE_DIST"

      - name: Ensure POSIX checksum command compatibility on Windows
        shell: bash
        run: |
          if command -v shasum >/dev/null 2>&1; then
            exit 0
          fi

          if ! command -v sha256sum >/dev/null 2>&1; then
            echo "::error::Neither shasum nor sha256sum is available. This job requires one of them for checksum validation."
            exit 1
          fi

          cat <<'EOF' > "$RUNNER_TEMP/shasum"
          #!/usr/bin/env bash
          args=("$@")

          if [[ "${args[0]:-}" == "-a" ]]; then
            args=("${args[@]:2}")
          fi

          sha256sum "${args[@]}"
          EOF
          chmod +x "$RUNNER_TEMP/shasum"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Assemble Windows desktop artifacts via private release entrypoint
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_REF: ${{ needs.prepare.outputs.ref }}
          RELEASE_HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          RELEASE_ENTRYPOINT: ${{ needs.prepare.outputs.release_entrypoint }}
          GH_TOKEN: ${{ secrets.OPENCOWORK_SOURCE_REPO_TOKEN }}
          OPENCOWORK_SOURCE_REPO: ${{ needs.prepare.outputs.source_repository }}
          OPENCOWORK_RUN_WINDOWS_INSTALLER_SMOKE: "0"
          OPENCOWORK_RUNTIME_BUNDLE_LOCAL_FILE: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' && format('{0}/opencowork-runtime-{1}-win32-x64.tar.gz', env.RUNTIME_BUNDLE_DIST, needs.prepare.outputs.version) || '' }}
          OPENCOWORK_RUNTIME_BUNDLE_LOCAL_SHA_FILE: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' && format('{0}/opencowork-runtime-{1}-win32-x64.tar.gz.sha256', env.RUNTIME_BUNDLE_DIST, needs.prepare.outputs.version) || '' }}
          WINDOWS_LOG_RUNTIME_BUNDLE_FILE: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' && format('{0}/opencowork-runtime-{1}-win32-x64.tar.gz', env.RUNTIME_BUNDLE_DIST, needs.prepare.outputs.version) || '' }}
          WINDOWS_LOG_RUNTIME_BUNDLE_SHA_FILE: ${{ needs.prepare.outputs.runtime_fallback_build == 'true' && format('{0}/opencowork-runtime-{1}-win32-x64.tar.gz.sha256', env.RUNTIME_BUNDLE_DIST, needs.prepare.outputs.version) || '' }}
          OPENCOWORK_RELEASE_MODE: full
        run: |
          ENTRYPOINT="$GITHUB_WORKSPACE/$RELEASE_ENTRYPOINT"
          if [ ! -f "$ENTRYPOINT" ]; then
            echo "::error::Private release entrypoint not found: $RELEASE_ENTRYPOINT"
            exit 1
          fi

          chmod +x "$ENTRYPOINT"
          ENTRYPOINT_ARGS=(
            --version "$RELEASE_VERSION"
            --ref "$RELEASE_REF"
            --head-sha "$RELEASE_HEAD_SHA"
            --output-dir "$RELEASE_DIST"
          )
          if bash "$ENTRYPOINT" --help >/tmp/release-entrypoint-help.txt 2>&1; then
            if grep -q -- "--mode" /tmp/release-entrypoint-help.txt; then
              ENTRYPOINT_ARGS+=(--mode full)
            fi
          fi

          echo "Windows assembly contract:"
          echo "  entrypoint=$ENTRYPOINT"
          echo "  output_dir=$RELEASE_DIST"
          echo "  mode=full (forced by this workflow when supported)"
          echo "  windows runtime fallback bundle file=${WINDOWS_LOG_RUNTIME_BUNDLE_FILE:-<not set>}"
          if [[ -n "${WINDOWS_LOG_RUNTIME_BUNDLE_FILE}" ]]; then
            echo "  windows runtime fallback bundle exists=$([ -f "$WINDOWS_LOG_RUNTIME_BUNDLE_FILE" ] && echo yes || echo no)"
          else
            echo "  windows runtime fallback bundle exists=<not set>"
          fi
          if [[ -n "${WINDOWS_LOG_RUNTIME_BUNDLE_SHA_FILE}" ]]; then
            echo "  windows runtime fallback sha exists=$([ -f "$WINDOWS_LOG_RUNTIME_BUNDLE_SHA_FILE" ] && echo yes || echo no)"
          else
            echo "  windows runtime fallback sha exists=<not set>"
          fi
          if [[ "${#ENTRYPOINT_ARGS[@]}" -gt 0 ]]; then
            echo "  entrypoint args:"
            printf '    %q ' "${ENTRYPOINT_ARGS[@]}"
            echo
          fi
          bash "$ENTRYPOINT" "${ENTRYPOINT_ARGS[@]}"

      - name: Collect Windows artifact manifest
        id: windows-artifacts
        shell: bash
        run: |
          mapfile -t WINDOWS_ARTIFACTS < <(bash scripts/collect-release-files.sh --release-dir "$RELEASE_DIST" --platform windows)
          echo "artifact snapshot before Windows installer smoke:"
          printf '%s\n' "${WINDOWS_ARTIFACTS[@]}"
          {
            echo 'paths<<EOF'
            printf '%s\n' "${WINDOWS_ARTIFACTS[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Run Windows installer smoke
        shell: bash
        run: |
          node scripts/run-packaged-installer-smoke-windows.cjs --release-dir "$RELEASE_DIST"

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-x64
          retention-days: 7
          path: ${{ steps.windows-artifacts.outputs.paths }}

      - name: Save Electron downloads cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ needs.prepare.outputs.version }}-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}

  resume-release-assets:
    needs: [prepare, submit-notarization-stage]
    runs-on: macos-14
    timeout-minutes: 360
    env:
      RELEASE_DIST: /tmp/opencowork-release-dist
      STAGE_DIST: /tmp/opencowork-notarize-stage
    steps:
      - name: Checkout private source repository
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.prepare.outputs.source_repository }}
          token: ${{ secrets.OPENCOWORK_SOURCE_REPO_TOKEN }}
          ref: ${{ needs.prepare.outputs.head_sha }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Verify checked out commit
        run: |
          ACTUAL_SHA="$(git rev-parse HEAD)"
          EXPECTED_SHA="${{ needs.prepare.outputs.head_sha }}"
          if [[ "$ACTUAL_SHA" != "$EXPECTED_SHA" && "$ACTUAL_SHA" != "${EXPECTED_SHA}"* ]]; then
            echo "::error::Checked out commit $ACTUAL_SHA does not match requested head_sha $EXPECTED_SHA"
            exit 1
          fi

      - name: Restore Electron downloads cache
        id: electron-cache-restore
        continue-on-error: true
        uses: actions/cache/restore@v5
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ needs.prepare.outputs.version }}-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-

      - name: Prepare artifact directory
        run: mkdir -p "$RELEASE_DIST" "$STAGE_DIST"

      - name: Download notarization stage artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-macos-notarize-stage
          path: ${{ env.STAGE_DIST }}/_internal

      - name: Run private release assembly contract (resume notarization stage)
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_REF: ${{ needs.prepare.outputs.ref }}
          RELEASE_HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          RELEASE_ENTRYPOINT: ${{ needs.prepare.outputs.release_entrypoint }}
          GH_TOKEN: ${{ secrets.OPENCOWORK_SOURCE_REPO_TOKEN }}
          OPENCOWORK_SOURCE_REPO: ${{ needs.prepare.outputs.source_repository }}
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          OPENCOWORK_NOTARIZE_STAGE_DIR: ${{ env.STAGE_DIST }}
          ELECTRON_CACHE: ${{ vars.ELECTRON_CACHE }}
          ELECTRON_DOWNLOAD_URL: ${{ vars.ELECTRON_DOWNLOAD_URL }}
          ELECTRON_MIRROR: ${{ vars.ELECTRON_MIRROR }}
          ELECTRON_CUSTOM_DIR: ${{ vars.ELECTRON_CUSTOM_DIR }}
          ELECTRON_CUSTOM_FILENAME: ${{ vars.ELECTRON_CUSTOM_FILENAME }}
          OPENCOWORK_RELEASE_MODE: resume
        run: |
          ENTRYPOINT="$GITHUB_WORKSPACE/$RELEASE_ENTRYPOINT"
          if [ ! -f "$ENTRYPOINT" ]; then
            echo "::error::Private release entrypoint not found: $RELEASE_ENTRYPOINT"
            exit 1
          fi

          chmod +x "$ENTRYPOINT"
          ENTRYPOINT_ARGS=(
            --version "$RELEASE_VERSION"
            --ref "$RELEASE_REF"
            --head-sha "$RELEASE_HEAD_SHA"
            --output-dir "$RELEASE_DIST"
          )
          if bash "$ENTRYPOINT" --help >/tmp/release-entrypoint-help.txt 2>&1; then
            if grep -q -- "--mode" /tmp/release-entrypoint-help.txt; then
              ENTRYPOINT_ARGS+=(--mode resume)
            fi
          fi
          bash "$ENTRYPOINT" "${ENTRYPOINT_ARGS[@]}"

      - name: Verify release outputs
        run: |
          if [ ! -d "$RELEASE_DIST" ]; then
            echo "::error::Release output directory missing: $RELEASE_DIST"
            exit 1
          fi

          echo "Collected files:"
          find "$RELEASE_DIST" -type f | sort

          INSTALLER_COUNT="$(find "$RELEASE_DIST" -type f \( \
            -name '*.dmg' -o \
            -name '*.zip' -o \
            -name '*.tar.gz' -o \
            -name '*.exe' -o \
            -name '*.msi' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' \
          \) | wc -l | tr -d ' ')"

          if [ "$INSTALLER_COUNT" = "0" ]; then
            echo "::error::No standalone installer artifacts were produced."
            echo "::error::Expected at least one file such as .dmg, .zip, .exe, .msi, .AppImage, .deb, or .rpm."
            exit 1
          fi

      - name: Generate checksums
        run: |
          cd "$RELEASE_DIST"
          rm -f SHA256SUMS.txt
          while IFS= read -r -d '' file; do
            rel_path="${file#./}"
            shasum -a 256 "$rel_path" >> SHA256SUMS.txt
          done < <(find . -type f ! -path './_internal/*' ! -name 'SHA256SUMS.txt' -print0 | sort -z)

      - name: Generate fallback release metadata
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_REF: ${{ needs.prepare.outputs.ref }}
          RELEASE_HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          SOURCE_REPOSITORY: ${{ needs.prepare.outputs.source_repository }}
        run: |
          ruby <<'RUBY'
          require "json"
          require "time"

          out_dir = ENV.fetch("RELEASE_DIST")
          internal_dir = File.join(out_dir, "_internal")
          Dir.mkdir(internal_dir) unless Dir.exist?(internal_dir)
          metadata_path = File.join(internal_dir, "release-metadata.json")
          notes_path = File.join(internal_dir, "release-notes.md")
          checksum_path = File.join(out_dir, "SHA256SUMS.txt")

          checksum_map = {}
          if File.exist?(checksum_path)
            File.readlines(checksum_path, chomp: true).each do |line|
              next if line.strip.empty?
              sha, file = line.split(/\s+/, 2)
              checksum_map[file.sub(/\A\*/, "")] = sha
            end
          end

          files = Dir.glob(File.join(out_dir, "**", "*"), File::FNM_DOTMATCH)
            .select { |path| File.file?(path) }
            .map { |path| path.delete_prefix("#{out_dir}/") }
            .reject { |path| [".", "..", "release-notes.md"].include?(path) || path.start_with?("_internal/") }
            .sort

          unless File.exist?(metadata_path)
            metadata = {
              product_name: "OpenCoWork",
              version: ENV.fetch("RELEASE_VERSION"),
              tag_name: "v#{ENV.fetch("RELEASE_VERSION")}",
              source_repository: ENV.fetch("SOURCE_REPOSITORY"),
              source_ref: ENV.fetch("RELEASE_REF"),
              source_head_sha: ENV.fetch("RELEASE_HEAD_SHA"),
              generated_at: Time.now.utc.iso8601,
              files: files.map { |path|
                {
                  path: path,
                  sha256: checksum_map[path]
                }.compact
              }
            }

            File.write(metadata_path, JSON.pretty_generate(metadata) + "\n")
          end

          unless File.exist?(notes_path)
            lines = []
            lines << "## OpenCoWork v#{ENV.fetch("RELEASE_VERSION")}"
            lines << ""
            lines << "macOS Apple Silicon release."
            lines << ""
            lines << "### Install"
            lines << ""
            lines << "- Download `OpenCoWork-#{ENV.fetch("RELEASE_VERSION")}-arm64.dmg`"
            lines << "- Open the DMG and drag OpenCoWork into `Applications`"
            lines << ""
            lines << "### Update"
            lines << ""
            lines << "- `OpenCoWork-#{ENV.fetch("RELEASE_VERSION")}-arm64.zip` and generated `*-mac.yml` metadata are for in-app auto-update"
            lines << "- Most users only need the DMG"

            File.write(notes_path, lines.join("\n") + "\n")
          end
          RUBY

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-macos-arm64
          retention-days: 7
          path: |
            ${{ env.RELEASE_DIST }}/OpenCoWork-*.dmg
            ${{ env.RELEASE_DIST }}/OpenCoWork-*.zip
            ${{ env.RELEASE_DIST }}/OpenCoWork-*.zip.blockmap
            ${{ env.RELEASE_DIST }}/latest-mac.yml
            ${{ env.RELEASE_DIST }}/_internal/release-metadata.json
            ${{ env.RELEASE_DIST }}/_internal/release-notes.md

      - name: Save Electron downloads cache
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v5
        with:
          path: ~/Library/Caches/electron
          key: ${{ runner.os }}-electron-${{ needs.prepare.outputs.version }}-${{ hashFiles('desktop/package-lock.json', 'desktop/package.json') }}
